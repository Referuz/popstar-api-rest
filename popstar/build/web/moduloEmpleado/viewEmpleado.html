<!DOCTYPE html>
    <div class="contenedor-empleados m-5 vh-100 rounded-4">
        <div class="container-fluid rounded-top-4 pt-2 d-flex justify-content-center bg-dark text-light mt-3" id="seccionEmpleados">
            <h1>Empleados</h1>
        </div>
    
        <div class="container-fluid d-flex justify-content-center mt-2" id="menuEmpleados">
            <button onclick="gralController.mostrarEmpleados()"
                    class="btn form-control me-2 custom-btn-empleados text-dark btn-light">Mostrar</button>
            <button onclick="gralController.mostrarAdministracion()" 
                    class="btn form-control me-2 custom-btn-empleados text-dark btn-light">Administrar</button>
        </div>
        <div class="container-fluid px-3 pb-3 pt-2">
            
            <div class="bg-dark py-2 rounded-4 mx-5 d-none" id="administrar" style="font-family: 'TimesNewerRoman'">
                <form id="formAdministrarEmpleado" class="my-2 mx-3">
                    <div class="d-flex">
                        <input type="text" placeholder="Nombre(s)" id="txtAdminNombre"
                               class="form-control me-2 fs-5">
                        <input type="text" placeholder="Apellidos" id="txtAdminApellidos"
                               class="form-control ms-2 fs-5">
                    </div>
                    <div class="d-flex mt-3">
                        <input type="text" placeholder="Telefono" id="txtAdminTelefono"
                               class="form-control fs-5">
                        
                        
                        <select name="sucursales" id="selectAdminSucursal" class="form-select ms-3 fs-5">
                        </select>
                        
                        
                        <button type="button" id="btnAdminBuscar"
                                class="btn form-control ms-3 w-50 px-2 text-light fw-bold fs-5"
                                style="background-color: steelblue">
                            Buscar
                        </button>
                     </div>
                    <div class="d-flex mt-3 justify-content-around">
                        <button type="button" id="btnAdminEliminar"
                                class="btn form-control mx-3 w-50 px-2 text-light fw-bold fs-5"
                                style="background-color: crimson">
                            Eliminar
                        </button>
                        <button type="button" id="btnAdminAgregar"
                                class="btn fw-bold form-control mx-3 w-50 px-2 text-light fs-5"
                                style="background-color: seagreen">
                            Agregar
                        </button>
                        <button type="button" id="btnAdminActualizar"
                                class="btn fw-bold form-control mx-3 w-50 px-2 text-light fs-5"
                                style="background-color: deepskyblue">
                            Actualizar
                        </button>
                    </div>
                </form>
            </div>
            
            
            <div class="bg-dark py-2 rounded-4 mt-3 row d-none" id="info" ></div>
            
        </div>
    </div>
