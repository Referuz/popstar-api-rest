<!DOCTYPE html>
<html>
    <head>
        <title>Empresa PopStar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Torres">
        <meta name="keywords" content="Popstar Amburguesas">
        <meta name="description" content="Web de amburguesas Popstar">
        <link rel="stylesheet" href="leafLet/leaflet.css"/>
        <link href="bootstrap/css/bootstrap.css" rel="stylesheet" type="text/css"/>
        <link rel="stylesheet" href="css/style.css"/>
    </head>
    <body>
        <header class="d-flex justify-content-center">
            <div id="menu" class="container-fluid d-flex justify-content-around py-2">
                <button type="button" onclick="cargarModuloEmpleado()" 
                        id="btnEmpleadoHeader">Empleado</button>
                <button type="button" onclick="cargarModuloSucursal()" 
                        id="btnSucursalHeader">Sucursal</button>
                <button type="button" onclick="">Cliente</button>
                <button type="button" onclick="">Productos</button>
            </div>
            <div id="mainCarrusel" class="carousel slide" data-bs-ride="carousel" data-bs-pause="false">
                <div class="carousel-inner">

                    <div class="carousel-item active">
                        <img src="images/burger01.jpg" alt="..." class="d-block w-100">
                    </div>
                    
                    <div class="carousel-item">
                        <img src="images/drink01.jpg" alt="..." class="d-block w-100">
                    </div>

                    <div class="carousel-item">
                        <img src="images/place01.jpg" alt="..." class="d-block w-100">
                    </div>

                    <div class="carousel-item">
                        <img src="images/chef01.jpg" alt="..." class="d-block w-100">
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#mainCarrusel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#mainCarrusel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </header>
        <div id="mainContent"></div>
        
        
        <script src="leafLet/leaflet.js"></script>
        <script src="bootstrap/js/bootstrap.js" type="text/javascript"></script>
        <script src="js/script.js?v=1.0"></script>
    </body>
</html>
